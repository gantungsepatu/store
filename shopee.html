<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@pekerjasaleskreatif - Premium Affiliate Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= Variabel Warna & Tema ================= */
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --shopee-orange: #ff6600;
            --shopee-grad: linear-gradient(135deg, #ff6600, #ff4500);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        /* ================= Pengaturan Dasar ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 102, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(52, 152, 219, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 80px;
        }
        a { text-decoration: none; color: inherit; }

        /* ================= Layout Utama ================= */
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* ================= Header Banner & Profil ================= */
        .hero-section { position: relative; padding-bottom: 20px; }
        .banner-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -60px;
            position: relative;
            z-index: 10;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--bg-dark);
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.6);
            object-fit: cover;
        }
        .username {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 10px;
            background: var(--shopee-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .verified-badge { color: #38bdf8; font-size: 1.2rem; }
        .bio { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; text-align: center; padding: 0 20px;}

        /* ================= Tombol Sosial Media ================= */
        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .social-btn {
            width: 45px; height: 45px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            transition: 0.3s all;
        }
        .social-btn:hover { transform: translateY(-5px); background: var(--shopee-grad); border-color: transparent; }

        /* ================= Menu Navigasi Dashboard ================= */
        .dashboard-menu {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px 20px;
            margin-bottom: 25px;
            scrollbar-width: none;
        }
        .dashboard-menu::-webkit-scrollbar { display: none; }
        
        .menu-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            font-size: 0.85rem; font-weight: 600;
            white-space: nowrap;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }
        .menu-item.active, .menu-item:hover {
            background: var(--shopee-grad);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.4);
        }

        /* ================= Bagian Konten & Grid ================= */
        .section-container { padding: 0 20px; margin-bottom: 40px; }
        .section-title {
            font-size: 1.3rem; font-weight: 700;
            margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
            border-left: 4px solid var(--shopee-orange);
            padding-left: 10px;
        }
        .section-title i { color: var(--shopee-orange); }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
        }

        /* ================= Kartu Produk ================= */
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            display: flex; flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--shopee-orange);
            box-shadow: 0 10px 25px rgba(255, 102, 0, 0.2);
        }
        .img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .badge-hot {
            position: absolute; top: 10px; right: 10px;
            background: #ef4444; color: white;
            padding: 4px 8px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 700;
        }
        .product-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        .btn-buy {
            margin-top: auto;
            background: var(--shopee-grad);
            color: white;
            text-align: center;
            padding: 8px 0;
            border-radius: 8px;
            font-size: 0.85rem; font-weight: 700;
        }

        /* ================= Floating Chat ================= */
        .floating-wa {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px;
            background-color: #25D366; color: white;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2rem;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.5);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Konten di sini sesuai dengan struktur index (5) (1).html -->

        <img src="https://images.unsplash.com/photo-1558769132-cb1aea458c5e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Banner" class="banner-img">
        <div class="profile-box">
            <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
            <div class="username">Velocity Store <i class="fas fa-check-circle verified-badge"></i></div>
            <div class="bio">@pekerjasaleskreatif • Fashion Pria, Olahraga & Streetwear Original</div>
        </div>
    </header>
    <!-- Tambahkan bagian lainnya (Social Bar, Menu, Grid Produk) sesuai struktur yang diinginkan -->
</div>

<a href="https://wa.me/6281234567890" class="floating-wa" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
