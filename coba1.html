<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@gantungsepatu - Premium Affiliate Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === RESET & VARIABEL === */
        :root { --bg-dark: #0f172a; --bg-card: rgba(30, 41, 59, 0.7); --shopee-orange: #ff6600; --shopee-grad: linear-gradient(135deg, #ff6600, #ff4500); --glass-border: rgba(255, 255, 255, 0.1); --text-main: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        .app-container { max-width: 800px; margin: 0 auto; min-height: 100vh; }

        /* === HEADER === */
        .hero-section { position: relative; padding-bottom: 20px; }
        .banner-img { width: 100%; height: 200px; object-fit: cover; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .profile-box { display: flex; flex-direction: column; align-items: center; margin-top: -60px; position: relative; z-index: 10; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--bg-dark); object-fit: cover; background-color: #1e293b; }
        .username { font-size: 1.5rem; font-weight: 800; margin-top: 10px; }
        .bio { color: #94a3b8; font-size: 0.9rem; text-align: center; margin-bottom: 20px; }

        /* === NAVIGASI === */
        .dashboard-menu { display: flex; justify-content: center; gap: 10px; padding: 10px 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .menu-item { padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
        .menu-item.active { background: var(--shopee-grad); border: none; }

        /* === PRODUK & ANIMASI === */
        .section-container { padding: 0 20px; margin-bottom: 40px; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; border-left: 4px solid var(--shopee-orange); padding-left: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: var(--bg-card); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s ease, box-shadow 0.3s ease; border: 1px solid var(--glass-border); }
        .product-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.4); border-color: var(--shopee-orange); }
        .img-wrapper { position: relative; aspect-ratio: 1/1; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-buy { width: 90%; margin: 10px auto; background: var(--shopee-grad); text-align: center; padding: 8px; border-radius: 8px; font-weight: 700; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="hero-section">
        <img src="https://images.unsplash.com/photo-1558769132-cb1aea458c5e?auto=format&fit=crop&w=1000&q=80" class="banner-img">
        <div class="profile-box">
            <img src="https://via.placeholder.com/150" class="avatar">
            <div class="username">Gantung Sepatu <i class="fas fa-check-circle" style="color:#38bdf8; font-size:1rem;"></i></div>
            <div class="bio">@gantung_sepatu.id • Fashion Pria, Olahraga & Streetwear</div>
        </div>
    </header>

    <div class="dashboard-menu">
        <a href="#" class="menu-item active" onclick="filterContent('semua', this)">Beranda</a>
        <a href="#" class="menu-item" onclick="filterContent('populer', this)">Terpopuler</a>
        <a href="#" class="menu-item" onclick="filterContent('baju', this)">Jersey</a>
        <a href="#" class="menu-item" onclick="filterContent('kesehatan', this)">Titipan Istri</a>
    </div>

    <div class="section-container" id="populer">
        <h2 class="section-title">Produk Populer</h2>
        <div class="product-grid">
            <a href="#" class="product-card">
                <div class="img-wrapper"><img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff" class="product-img"></div>
                <div class="product-info"><div class="btn-buy">Beli di Shopee</div></div>
            </a>
        </div>
    </div>
</div>

<script>
    function filterContent(kategori, element) {
        document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        document.querySelectorAll('.section-container').forEach(sec => {
            sec.style.display = (kategori === 'semua' || sec.id === kategori) ? 'block' : 'none';
        });
    }
</script>

</body>
</html>
