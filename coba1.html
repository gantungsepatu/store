<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@gantungsepatu - Premium Affiliate Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================= Variabel Warna & Tema ================= */
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --shopee-orange: #ff6600;
            --shopee-grad: linear-gradient(135deg, #ff6600, #ff4500);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        /* ================= Pengaturan Dasar ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 102, 0, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(52, 152, 219, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 80px;
        }
        a { text-decoration: none; color: inherit; }

        /* ================= Layout & Komponen Lain ================= */
        .app-container { max-width: 800px; margin: 0 auto; min-height: 100vh; }
        .hero-section { position: relative; padding-bottom: 20px; }
        .banner-img { width: 100%; height: 200px; object-fit: cover; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .profile-box { display: flex; flex-direction: column; align-items: center; margin-top: -60px; position: relative; z-index: 10; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--bg-dark); box-shadow: 0 0 20px rgba(255, 102, 0, 0.6); object-fit: cover; }
        .username { font-size: 1.8rem; font-weight: 800; margin-top: 10px; background: var(--shopee-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 5px; }
        .bio { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; text-align: center; padding: 0 20px;}
        .social-bar { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .social-btn { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; background: var(--bg-card); border: 1px solid var(--glass-border); backdrop-filter: blur(10px); transition: 0.3s all; }
        
        .dashboard-menu { display: flex; overflow-x: auto; gap: 10px; padding: 10px 20px; margin-bottom: 25px; scrollbar-width: none; }
        .menu-item { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 30px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; transition: 0.3s; backdrop-filter: blur(10px); }
        .menu-item.active { background: var(--shopee-grad); border-color: transparent; }

        .section-container { padding: 0 20px; margin-bottom: 40px; transition: opacity 0.3s ease; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; border-left: 4px solid var(--shopee-orange); padding-left: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        
        .floating-wa { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: #25D366; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2rem; box-shadow: 0 5px 20px rgba(37, 211, 102, 0.5); z-index: 1000; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="hero-section">
        <img src="https://images.unsplash.com/photo-1558769132-cb1aea458c5e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Banner" class="banner-img">
        <div class="profile-box">
            <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
            <div class="username">Gantung Sepatu <i class="fas fa-check-circle"></i></div>
            <div class="bio">@gantung_sepatu.id • Fashion Pria, Olahraga & Streetwear Original</div>
        </div>
    </header>

    <div class="dashboard-menu">
        <a href="#semua" class="menu-item active" onclick="filterContent('semua', this)"><i class="fas fa-home"></i> Beranda</a>
        <a href="#populer" class="menu-item" onclick="filterContent('populer', this)"><i class="fas fa-fire"></i> Terpopuler</a>
        <a href="#baju" class="menu-item" onclick="filterContent('baju', this)"><i class="fas fa-tshirt"></i> Baju</a>
        <a href="#kesehatan" class="menu-item" onclick="filterContent('filter-kesehatan', this)"><i class="fas fa-heartbeat"></i> Kesehatan</a>
    </div>

    <div class="section-container" id="populer">
        <h2 class="section-title"><i class="fas fa-crown"></i> Produk Populer</h2>
        <div class="product-grid">
            </div>
    </div>

    <div class="section-container" id="baju">
        <h2 class="section-title"><i class="fas fa-tshirt"></i> Koleksi Baju Pria</h2>
        <div class="product-grid">
        </div>
    </div>

    <div class="section-container" id="filter-kesehatan">
        <h2 class="section-title"><i class="fas fa-heartbeat"></i> Perawatan & Kesehatan</h2>
        <div class="product-grid">
        </div>
    </div>
</div>

<script>
    function filterContent(kategori, element) {
        document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');

        const sections = document.querySelectorAll('.section-container');
        sections.forEach(sec => {
            sec.style.display = (kategori === 'semua' || sec.id === kategori) ? 'block' : 'none';
        });
    }
</script>

</body>
</html>
