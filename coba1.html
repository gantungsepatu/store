<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@gantungsepatu - Premium Affiliate Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-dark: #0f172a; --bg-card: rgba(30, 41, 59, 0.7); --shopee-orange: #ff6600; --shopee-grad: linear-gradient(135deg, #ff6600, #ff4500); --glass-border: rgba(255, 255, 255, 0.1); --text-main: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        .app-container { max-width: 800px; margin: 0 auto; }
        
        /* Header & Profil */
        .hero-section { position: relative; padding-bottom: 20px; }
        .banner-img { width: 100%; height: 200px; object-fit: cover; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .profile-box { display: flex; flex-direction: column; align-items: center; margin-top: -60px; position: relative; z-index: 10; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--bg-dark); object-fit: cover; background: #1e293b; }
        .username { font-size: 1.5rem; font-weight: 800; margin-top: 10px; display: flex; align-items: center; }
        .bio { color: #94a3b8; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
        
        /* Social Bar */
        .social-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .social-btn { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; background: var(--bg-card); border: 1px solid var(--glass-border); transition: 0.3s; }
        .social-btn:hover { background: var(--shopee-grad); border-color: transparent; }

        /* Menu */
        .dashboard-menu { display: flex; justify-content: center; gap: 10px; padding: 20px; flex-wrap: wrap; }
        .menu-item { padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 30px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.3s; color: #ffffff; text-decoration: none; backdrop-filter: blur(10px); }
        .menu-item.active { background: var(--shopee-grad); border: none; }
        
        /* Produk */
        .section-container { padding: 0 20px; margin-bottom: 40px; }
        .section-title { font-size: 1.2rem; margin-bottom: 15px; border-left: 4px solid var(--shopee-orange); padding-left: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .product-card { background: var(--bg-card); border-radius: 16px; overflow: hidden; display: block; transition: 0.3s ease, box-shadow 0.3s ease; border: 1px solid var(--glass-border); }
        .product-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.4); border-color: var(--shopee-orange); }
        .img-wrapper { position: relative; aspect-ratio: 1/1; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .badge-hot { position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; padding: 4px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .product-info { padding: 15px; }
        .btn-buy { width: 100%; background: var(--shopee-grad); text-align: center; padding: 8px; border-radius: 8px; font-weight: 700; margin-top: 10px; }

        /* Ikon WhatsApp */
        .floating-wa { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); z-index: 100; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }
    </style>
</head>
<body>

<div class="app-container">

<script>
    function filterContent(kategori, element) {
        document.querySelectorAll('.menu-item').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        document.querySelectorAll('.section-container').forEach(sec => {
            sec.style.display = (kategori === 'semua' || sec.id === kategori) ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
